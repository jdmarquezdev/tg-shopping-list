version: '3.8'

services:
  shopping-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SHOPPING_FILE_PATH=/data/SHOPPING.md
      - ALLOWED_USER_ID=${ALLOWED_USER_ID:-}
    volumes:
      - type: bind
        source: /root/.openclaw/workspace
        target: /data
    restart: unless-stopped
