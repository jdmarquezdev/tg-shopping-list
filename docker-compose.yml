version: '3.8'

services:
  shopping-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SHOPPING_FILE_PATH=/data/SHOPPING.md
      - ALLOWED_USER_ID=${ALLOWED_USER_ID:-}
    volumes:
      - shopping-data:/data
    restart: unless-stopped

volumes:
  shopping-data:
