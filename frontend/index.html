<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista de la Compra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--tg-theme-text-color, #000000);
        }

        .add-form {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .add-form input {
            flex: 1;
            min-width: 150px;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #cccccc);
            border-radius: 8px;
            font-size: 16px;
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
        }

        .add-form select {
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #cccccc);
            border-radius: 8px;
            font-size: 16px;
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
            min-width: 120px;
        }

        .add-form button {
            padding: 12px 20px;
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 500;
        }

        .add-form button:active {
            opacity: 0.8;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            user-select: none;
        }

        .section-header:active {
            opacity: 0.8;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--tg-theme-text-color, #000000);
        }

        .section-toggle {
            font-size: 18px;
            transition: transform 0.2s;
        }

        .section-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .shopping-list {
            list-style: none;
        }

        .shopping-list.collapsed {
            display: none;
        }

        .shopping-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 8px;
            gap: 12px;
        }

        .shopping-item.checked .item-name {
            text-decoration: line-through;
            opacity: 0.6;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--tg-theme-hint-color, #cccccc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .shopping-item.checked .checkbox {
            background-color: var(--tg-theme-button-color, #3390ec);
            border-color: var(--tg-theme-button-color, #3390ec);
        }

        .checkbox::after {
            content: '✓';
            color: var(--tg-theme-button-text-color, #ffffff);
            font-size: 16px;
            display: none;
        }

        .shopping-item.checked .checkbox::after {
            display: block;
        }

        .item-name {
            flex: 1;
            font-size: 16px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--tg-theme-hint-color, #999999);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #999999);
        }

        .error {
            background-color: #ff4444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .section-item-count {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999999);
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 Lista de la Compra</h1>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <form class="add-form" id="addForm">
            <input type="text" id="itemInput" placeholder="Añadir producto..." required>
            <select id="sectionSelect">
                <option value="General">General</option>
            </select>
            <button type="submit">Añadir</button>
        </form>
        
        <div id="loading" class="loading">Cargando...</div>
        
        <div id="sectionsContainer"></div>
    </div>

    <script>
        // Inicializar Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Configurar colores del tema
        document.documentElement.style.setProperty('--tg-theme-bg-color', tg.backgroundColor || '#ffffff');
        document.documentElement.style.setProperty('--tg-theme-text-color', tg.textColor || '#000000');
        document.documentElement.style.setProperty('--tg-theme-button-color', tg.buttonColor || '#3390ec');
        document.documentElement.style.setProperty('--tg-theme-button-text-color', tg.buttonTextColor || '#ffffff');
        document.documentElement.style.setProperty('--tg-theme-secondary-bg-color', tg.secondaryBackgroundColor || '#f0f0f0');
        document.documentElement.style.setProperty('--tg-theme-hint-color', tg.hintColor || '#999999');

        // API base URL (configurable)
        const API_BASE = window.API_BASE_URL || '/api';

        // Estado
        let sections = [];
        let collapsedSections = new Set();

        // Elementos DOM
        const addForm = document.getElementById('addForm');
        const itemInput = document.getElementById('itemInput');
        const sectionSelect = document.getElementById('sectionSelect');
        const sectionsContainer = document.getElementById('sectionsContainer');
        const loading = document.getElementById('loading');
        const errorDiv = document.getElementById('error');

        // Mostrar error
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // Escapar HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Cargar lista
        async function loadList() {
            try {
                const userId = tg.initDataUnsafe?.user?.id?.toString();
                if (!userId) {
                    showError('No se pudo obtener el ID de usuario de Telegram');
                    return;
                }
                const response = await fetch(`${API_BASE}/lista`, {
                    headers: {
                        'X-Telegram-User': userId
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Error al cargar la lista');
                }
                
                const data = await response.json();
                sections = data.sections || [];
                updateSectionSelect();
                renderSections();
            } catch (err) {
                showError(err.message);
            } finally {
                loading.style.display = 'none';
            }
        }

        // Actualizar dropdown de secciones
        function updateSectionSelect() {
            const currentSelection = sectionSelect.value;
            sectionSelect.innerHTML = sections.map(s => 
                `<option value="${escapeHtml(s.name)}">${escapeHtml(s.name)}</option>`
            ).join('');
            
            // Mantener selección si existe
            if (sections.some(s => s.name === currentSelection)) {
                sectionSelect.value = currentSelection;
            }
        }

        // Toggle colapsar sección
        function toggleSection(sectionName) {
            if (collapsedSections.has(sectionName)) {
                collapsedSections.delete(sectionName);
            } else {
                collapsedSections.add(sectionName);
            }
            renderSections();
            tg.HapticFeedback.impactOccurred('light');
        }

        // Renderizar secciones
        function renderSections() {
            if (sections.length === 0 || sections.every(s => s.items.length === 0)) {
                sectionsContainer.innerHTML = '<div class="empty-state">La lista está vacía</div>';
                return;
            }

            sectionsContainer.innerHTML = sections.map(section => {
                const isCollapsed = collapsedSections.has(section.name);
                const checkedCount = section.items.filter(i => i.checked).length;
                const totalCount = section.items.length;
                
                return `
                    <div class="section">
                        <div class="section-header" onclick="toggleSection('${escapeHtml(section.name)}')">
                            <div>
                                <span class="section-title">${escapeHtml(section.name)}</span>
                                <span class="section-item-count">(${checkedCount}/${totalCount})</span>
                            </div>
                            <span class="section-toggle ${isCollapsed ? 'collapsed' : ''}">▼</span>
                        </div>
                        <ul class="shopping-list ${isCollapsed ? 'collapsed' : ''}">
                            ${section.items.map((item, index) => `
                                <li class="shopping-item ${item.checked ? 'checked' : ''}" data-section="${escapeHtml(section.name)}" data-index="${index}">
                                    <div class="checkbox" onclick="toggleItem('${escapeHtml(section.name)}', ${index})"></div>
                                    <span class="item-name">${escapeHtml(item.name)}</span>
                                </li>
                            `).join('')}
                            ${section.items.length === 0 ? '<li class="empty-state" style="padding: 20px;">Sin items en esta sección</li>' : ''}
                        </ul>
                    </div>
                `;
            }).join('');
        }

        // Añadir item
        addForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = itemInput.value.trim();
            if (!name) return;

            const section = sectionSelect.value;

            try {
                const userId = tg.initDataUnsafe?.user?.id?.toString();
                if (!userId) {
                    showError('No se pudo obtener el ID de usuario de Telegram');
                    return;
                }
                const response = await fetch(`${API_BASE}/agregar`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Telegram-User': userId
                    },
                    body: JSON.stringify({ name, section })
                });

                if (!response.ok) {
                    throw new Error('Error al añadir el item');
                }

                const data = await response.json();
                sections = data.sections || [];
                updateSectionSelect();
                renderSections();
                itemInput.value = '';
                tg.HapticFeedback.impactOccurred('light');
            } catch (err) {
                showError(err.message);
            }
        });

        // Toggle item (función global)
        window.toggleItem = async (sectionName, index) => {
            const section = sections.find(s => s.name === sectionName);
            if (!section || !section.items[index]) return;

            const item = section.items[index];

            try {
                const userId = tg.initDataUnsafe?.user?.id?.toString();
                if (!userId) {
                    showError('No se pudo obtener el ID de usuario de Telegram');
                    return;
                }
                const response = await fetch(`${API_BASE}/toggle`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Telegram-User': userId
                    },
                    body: JSON.stringify({ name: item.name, section: sectionName })
                });

                if (!response.ok) {
                    throw new Error('Error al actualizar el item');
                }

                const data = await response.json();
                sections = data.sections || [];
                updateSectionSelect();
                renderSections();
                tg.HapticFeedback.impactOccurred('light');
            } catch (err) {
                showError(err.message);
            }
        };

        // Cargar lista al inicio
        loadList();
    </script>
</body>
</html>
